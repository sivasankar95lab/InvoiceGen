name: Supabase Keep Alive

on:
  schedule:
    # Run twice a week: every Sunday and Thursday at 00:00 UTC
    - cron: '0 0 * * 0,4'
  workflow_dispatch: # Enable running manually from the GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -i -s -X GET "${{ secrets.SUPABASE_URL || 'https://ftljcewqbknmtqamhdta.supabase.co' }}/rest/v1/sync_data?select=key&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bGpjZXdxYmtubXRxYW1oZHRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjgzODgsImV4cCI6MjA5NzkwNDM4OH0.sYya3IEZQMzVEmj8ihldvUlwKbH3ne5dzSDfJH3gJGo' }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bGpjZXdxYmtubXRxYW1oZHRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjgzODgsImV4cCI6MjA5NzkwNDM4OH0.sYya3IEZQMzVEmj8ihldvUlwKbH3ne5dzSDfJH3gJGo' }}"
